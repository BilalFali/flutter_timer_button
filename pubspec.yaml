name: flutter_timer_button
description: >-
  A highly customizable timed & progress button for Flutter with an animated
  fill indicator. OTP resend, countdowns, sync/upload/download progress,
  rate-limited actions.
version: 0.1.0
homepage: https://github.com/bidev/flutter_timer_button
repository: https://github.com/bidev/flutter_timer_button
topics:
  - button
  - timer
  - progress
  - otp
  - countdown

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_async: ^1.3.1

flutter:
